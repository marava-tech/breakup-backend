spring:
  application:
    name: breakup-stories-api

  # Timezone configuration for Indian Standard Time
  # Jackson configuration is handled in JacksonConfig.java

  # JVM timezone configuration
  jvm:
    timezone: Asia/Kolkata

  data:
    mongodb:
      # Use URI only if explicitly provided (for backward compatibility)
      # Otherwise use individual properties to handle special characters in password
      # Note: If URI is empty or not set, Spring Boot will use individual properties below
      uri: 
      # Individual properties (used when URI is not set or empty)
      host: localhost
      port: 27017
      database: breakup_stories
      username: madhu
      password: REDACTED_DB_PASSWORD
      authentication-database: admin
      auto-index-creation: true

  
  # Gmail SMTP configuration for OTP emails
  mail:
    host: smtp.gmail.com
    port: 587
    username: marava.technologies@gmail.com
    password: REDACTED_GMAIL_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
  servlet:
    multipart:
          max-file-size: 50MB
          max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /

# JWT Configuration
jwt:
  secret: rA3jPjK6o0IBkSyKXZ8OEwTbU5z6a4NE2Kq+dfS2A3k=
  expiration: 2592000000 # 30 days in milliseconds




logging:
  level:
    com.breakupstories: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.mongodb.driver: INFO
    org.mongodb.driver.cluster: INFO
    org.mongodb.driver.connection: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    disable-swagger-default-url: true
    display-request-duration: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  paths-to-match: /api/**

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    mongo:
      enabled: true

# Cloudinary Configuration for Breakup Stories
app:
  cloudinary:
    cloud-name: dhssmiyoc
    api-key: REDACTED_CLOUDINARY_KEY
    api-secret: REDACTED_CLOUDINARY_SECRET

